# ahkmac example config — copy to ~/.config/ahkmac.conf and edit.

# Key remaps: vim-style arrows on option
opt+j :: down
opt+k :: up
opt+h :: left
opt+l :: right

# Targets may carry modifiers (line start / line end)
opt+a :: cmd+left
opt+e :: cmd+right

# Hotstring: fires after a space / enter / punctuation (end char is kept)
"btw" => "by the way"

# Hotstring with * fires immediately on the last character
*"@@" => "user@example.com"
