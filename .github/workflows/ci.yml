name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build (release)
        run: swift build -c release
      - name: Run unit tests
        run: swift test --parallel
      - name: Smoke-check example config
        run: .build/release/ahkmac --check examples/ahkmac.conf
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ahkmac-${{ github.sha }}
          path: .build/release/ahkmac

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64
          cp .build/apple/Products/Release/ahkmac .
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" ahkmac --title "$GITHUB_REF_NAME" --generate-notes
